<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西方政治思想史 · 选择题刷题</title>
<style>
:root{
  --bg:#f6f5f1; --card:#fff; --ink:#23211c; --ink2:#5c574d; --ink3:#8a8478;
  --line:#e3e0d8; --accent:#7a5cff; --accent-soft:#efeaff;
  --ok:#1a7d57; --ok-bg:#e6f4ec; --bad:#b23b2e; --bad-bg:#fbeae7;
  --amber:#a86413;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}
h1{font-size:21px;font-weight:700;letter-spacing:.5px}
.sub{color:var(--ink3);font-size:13px;margin-top:4px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.label{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fafaf8;cursor:pointer;user-select:none;transition:.12s;color:var(--ink2)}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px}
.btn{font-size:15px;font-weight:600;padding:11px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:.12s}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;color:var(--ink2);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink2);margin-bottom:6px}
.prog{height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.prog>i{display:block;height:100%;background:var(--accent);transition:.3s;width:0}
.qtype{display:inline-block;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:6px;margin-bottom:12px}
.qtext{font-size:17px;font-weight:600;line-height:1.55;margin-bottom:16px}
.qtext .hl{color:var(--accent)}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fafaf8;cursor:pointer;transition:.12s;font-size:15px}
.opt:hover{border-color:var(--accent)}
.opt .k{font-weight:700;color:var(--ink3);flex-shrink:0}
.opt.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.opt.correct .k{color:var(--ok)}
.opt.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
.opt.wrong .k{color:var(--bad)}
.opt.locked{cursor:default}
.opt.dim{opacity:.55}
.explain{margin-top:16px;padding:14px;border-radius:10px;background:#f3f1ea;border:1px dashed var(--line);font-size:14px;color:var(--ink2);display:none}
.explain.show{display:block}
.explain b{color:var(--ink)}
.explain .tag{display:inline-block;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 7px;margin:2px 4px 2px 0;color:var(--ink2)}
.foot{display:flex;justify-content:space-between;margin-top:18px;gap:8px}
.result{text-align:center;padding:10px 0}
.score{font-size:46px;font-weight:800;color:var(--accent);line-height:1.1}
.score small{font-size:18px;color:var(--ink3);font-weight:600}
.muted{color:var(--ink3);font-size:13px}
.tip{font-size:12px;color:var(--ink3);margin-top:10px;line-height:1.6}
.wrongnum{color:var(--bad);font-weight:700}
.hidden{display:none}
kbd{font-family:inherit;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 7px;font-size:12px;color:var(--ink2)}
.btn.amber{background:#a86413;color:#fff;border:none}
.btn.amber:hover{filter:brightness(1.08)}
.btn.added{background:#e6f4ec;color:var(--ok);border:1px solid var(--ok);cursor:default}
.io-box{width:100%;margin-top:10px;font-size:13px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;resize:vertical;color:var(--ink);font-family:inherit;min-height:72px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#23211c;color:#fff;font-size:14px;padding:10px 22px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:999}
.toast.show{opacity:1}
.modal-mask{position:fixed;inset:0;background:rgba(35,33,28,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-mask.hidden{display:none}
.modal-box{background:var(--card);border-radius:16px;padding:26px 24px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.22);text-align:center}
.modal-q{font-size:18px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{flex:1;transition:background .18s,color .18s,border-color .18s}
.gate-input{width:100%;font-size:16px;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;background:#fafaf8;color:var(--ink);margin-bottom:14px;text-align:center}
.gate-input:focus{outline:none;border-color:var(--accent)}
.gate-hint{font-size:12px;color:var(--ink3);margin-top:12px}
.blocked{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;color:var(--ink2);text-align:center;padding:30px;gap:10px}
.blocked .big{font-size:40px}
.blocked .t{font-size:18px;font-weight:700;color:var(--ink)}
/* 两个选项起初颜色一致（中性描边），鼠标放上去再变色 */
#modalNo:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
#modalYes:hover{background:var(--ok);color:#fff;border-color:var(--ok)}
</style>
</head>
<body>
<div class="wrap">
  <h1>西方政治思想史 · 选择题刷题</h1>
  <div class="sub">著作 ↔ 思想家 · 观点 → 思想家 · 命名观点 → 提出者　|　考前自测巩固</div>

  <!-- 设置区 -->
  <div id="setup">
    <div class="panel">
      <div class="label">练习范围（章节）</div>
      <div class="chips" id="eraChips"></div>
    </div>
    <div class="panel">
      <div class="label">题型</div>
      <div class="chips" id="typeChips"></div>
    </div>
    <div class="panel">
      <div class="label">题量</div>
      <div class="chips" id="countChips"></div>
      <div class="row">
        <button class="btn" id="startBtn">开始刷题</button>
        <button class="btn ghost" id="wrongBtn">只刷错题本 (<span id="wrongCount">0</span>)</button>
      </div>
      <div class="tip">提示：电脑上可用 <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> 选答案，<kbd>Enter</kbd> / <kbd>→</kbd> 下一题。错题会自动进入错题本，可反复重刷。</div>
    </div>
    <div class="panel">
      <div class="label">错题本备份（关闭浏览器前导出，下次打开后导入）</div>
      <div class="row" style="margin-top:0">
        <button class="btn ghost" id="exportBtn">导出错题本</button>
        <button class="btn ghost" id="importBtn">导入错题本</button>
        <button class="btn ghost" id="clearWrongBtn" style="color:var(--bad);border-color:var(--bad)">清空错题本</button>
      </div>
      <textarea class="io-box hidden" id="ioBox" placeholder="导出后文字会出现在这里，复制保存；导入时把文字粘贴到这里再点「确认导入」"></textarea>
      <button class="btn hidden" id="confirmImportBtn" style="margin-top:8px">确认导入</button>
    </div>
  </div>

  <!-- 答题区 -->
  <div id="quiz" class="hidden">
    <div class="panel">
      <div class="bar">
        <span id="qcount">第 1 / 20 题</span>
        <span>得分 <b id="liveScore">0</b>　错 <b class="wrongnum" id="liveWrong">0</b></span>
      </div>
      <div class="prog"><i id="progBar"></i></div>
      <div style="margin-top:18px">
        <span class="qtype" id="qtype"></span>
        <div class="qtext" id="qtext"></div>
        <div class="opts" id="opts"></div>
        <div class="explain" id="explain"></div>
      </div>
      <div class="foot">
        <div style="display:flex;gap:8px">
          <button class="btn ghost" id="quitBtn">结束</button>
          <button class="btn ghost" id="prevBtn" disabled>← 上一题</button>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn amber hidden" id="addWrongBtn">＋ 加入错题本</button>
          <button class="btn" id="nextBtn" disabled>下一题</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 结果区 -->
  <div id="result" class="hidden">
    <div class="panel result">
      <div class="score"><span id="finalScore">0</span><small> / <span id="finalTotal">0</span></small></div>
      <div class="muted" id="finalPct"></div>
      <div class="row" style="justify-content:center;margin-top:18px">
        <button class="btn" id="againBtn">再来一轮</button>
        <button class="btn ghost" id="redoWrongBtn">重刷本轮错题</button>
        <button class="btn ghost" id="backBtn">返回设置</button>
      </div>
      <div class="tip" id="resultTip"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 验证弹窗（答对才能进入）-->
<div class="modal-mask" id="gateModal">
  <div class="modal-box">
    <div class="modal-q">梁鹤鸣在 2025-2026 赛季身穿几号国政队球衣？</div>
    <input class="gate-input" id="gateInput" type="text" inputmode="numeric" placeholder="请输入号码" autocomplete="off">
    <div class="modal-btns">
      <button class="btn" id="gateSubmit" style="flex:1">确认</button>
    </div>
    <div class="gate-hint">仅限熟悉梁鹤鸣的人进入</div>
  </div>
</div>

<!-- 开场弹窗 -->
<div class="modal-mask hidden" id="introModal">
  <div class="modal-box">
    <div class="modal-q">梁鹤鸣是不是世界上最牛逼的人？</div>
    <div class="modal-btns">
      <button class="btn ghost" id="modalNo">没毛</button>
      <button class="btn ghost" id="modalYes">还真是</button>
    </div>
  </div>
</div>

<script>
/* ============ 数据：思想家 → 章节 / 著作 / 观点 ============ */
const ERAS = [
  "古希腊","希腊化·古罗马","古罗马帝国·中世纪","近代早期主权",
  "自由主义与宪政","民主与平等","保守主义·国家主义","近代后期自由主义",
  "近代社会主义","现代政治思想"
];

// works: 著作；alt: 著作别名（同一本书的其它译名，用于判断对错时也算正确不会误伤，此处仅展示）
// points: 可单独成题的核心观点/主张；concepts: 命名观点 → 该思想家
const DATA = [
 {name:"柏拉图",era:"古希腊",
  works:["《理想国》","《政治家篇》","《法律篇》"],
  alt:{"《理想国》":["《共和国》","《国家篇》","《王制》"],"《法律篇》":["《法篇》","《立法篇》"]},
  points:[
   "《理想国》主张哲学王统治，是最佳政制，更重城邦稳定甚于政治自由",
   "《法律篇》探求第二等好的政制，即混合政体，并主张法治",
   "《政治家篇》探讨何为掌握统治技艺的真正政治家",
   "政制退化顺序：荣誉政制→寡头政制→民主政制→僭主政制",
   "公有制只适用于护卫者群体，财产、妇女儿童共有",
   "理想城邦规模为5040户，且位置不能靠海",
   "正义是智慧、节制、勇敢三种美德的结合物",
   "《法律篇》的次佳政制主张数量平等与比例平等相结合",
   "城邦是个人的放大，城邦正义与个人正义同构"],
  concepts:[
   {n:"相论（哲学家掌握真理之“相”，他人只有意见）"},
   {n:"洞穴喻（山洞喻，比喻哲学家掌握真理、常人只见影像）"}]},

 {name:"亚里士多德",era:"古希腊",
  works:["《政治学》","《尼各马可伦理学》"],
  points:[
   "城邦是自然发展的产物，由家庭→村社→城邦演进，最高目的是使人过优良生活",

   "理想政体是君主与贵族政体，可实现的优良政体是共和政体（中产阶级主导的混合政体+法治）",

   "普通公民的品质是中庸，政治家的首要品质是明智"]},

 {name:"波利比乌斯",era:"希腊化·古罗马",
  works:["《历史》"],
  points:[
   "判断政体好坏的标准从“是否正义”转向“是否能维护稳定”",

   "罗马的执政官、元老院、民众大会彼此合作与相互制约，是混合均衡政体"]},

 {name:"西塞罗",era:"希腊化·古罗马",
  works:["《国家篇》","《法律篇》"],
  points:[
   "国家是人民的事业，基于正义的协定和利益的共同",
   "君主政体的优点是慈爱，贵族政体的优点是智慧，民众政府的优点是自由",
   "自然法根植于人的自然本性，人们在道德人格上平等"]},

 {name:"斯多葛学派",era:"希腊化·古罗马",
  works:[],
  points:[
   "自然法是宇宙最高普遍法则，是一切现实法律的来源与评判标准",
   "精神自由与外在境遇无关，理性是精神自由的基础",
   "共有理性是人人平等的基础（道德人格上的平等）"]},

 {name:"伊壁鸠鲁",era:"希腊化·古罗马",

  points:[

 {name:"查士丁尼",era:"希腊化·古罗马",
  works:[],
  points:[
   "正义是持之以恒地给予每个人应得的部分",

 {name:"布丹",era:"近代早期主权",
  works:["《国家论六卷》"],
  alt:{"《国家论六卷》":["《共和国六书》"]},
  points:[

 {name:"格劳秀斯",era:"近代早期主权",
  works:["《战争与和平法》"],
  points:[
   "开启理性主义自然法理论，是绝对主权理论的发展者",

   "主权不一定属于君主，但决不能属于人民",
   "拓展主权内涵，提出对外主权（国家在国际关系层面的主权）"]},

 {name:"霍布斯",era:"近代早期主权",
  works:["《利维坦》"],
  points:[

 {name:"哈林顿",era:"近代早期主权",

 {name:"斯宾诺莎",era:"近代早期主权",
  works:["《神学政治论》","《政治论》"],
  points:[
   "主张在绝对主权的前提下保障公民的权利"]},

 {name:"洛克",era:"自由主义与宪政",
  works:["《政府论》","《论宗教宽容》","《人类理解论》"],

/* ============ 工具 ============ */
const $=s=>document.querySelector(s);
const rnd=a=>a[Math.floor(Math.random()*a.length)];
let toastTimer=null;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200)}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(a,n,exclude){const pool=a.filter(x=>!exclude.includes(x));return shuffle(pool).slice(0,n)}

const TYPES=[
 {id:"w2a",name:"著作→思想家"},
 {id:"a2w",name:"思想家→著作"},
 {id:"p2a",name:"观点→思想家"},
 {id:"c2a",name:"命名观点→提出者"},

/* ============ 出题 ============ */
// 在选定章节、选定题型内生成一道题
function makeQuestion(pool, types){
  // 多次尝试，直到能在所选 pool/types 内造出题
  for(let t=0;t<40;t++){
    const type=rnd(types);
    if(type==="w2a"){
      const cands=pool.filter(p=>p.works&&p.works.length);
      if(!cands.length) continue;
      const who=rnd(cands); const work=rnd(who.works);
      const distractPool=othersWithDistinctName(ALL,who.name);
      const distract=sample(distractPool.map(p=>p.name),3,[who.name]);
      if(distract.length<3) continue;
      return buildQ("著作→思想家",`著作 <span class="hl">${work}</span> 的作者是哪位思想家？`,who.name,distract,who);
    }
    if(type==="a2w"){
      const cands=pool.filter(p=>p.works&&p.works.length);
      if(!cands.length) continue;
      const who=rnd(cands); const work=rnd(who.works);
      // 干扰：其他思想家的著作
      const otherWorks=[];
      ALL.forEach(p=>{if(p.name!==who.name&&p.works) p.works.forEach(w=>otherWorks.push(w))});
      const distract=sample(otherWorks,3,who.works);
      if(distract.length<3) continue;
      return buildQ("思想家→著作",`以下哪部著作是 <span class="hl">${who.name}</span> 的作品？`,work,distract,who);
    }
    if(type==="p2a"){
      const cands=pool.filter(p=>p.points&&p.points.length);
      if(!cands.length) continue;
      const who=rnd(cands); const pt=rnd(who.points);
      const distract=sample(ALL.map(p=>p.name),3,[who.name]);
      if(distract.length<3) continue;
      return buildQ("观点→思想家",`“<span class="hl">${pt}</span>”——这一主张出自哪位思想家？`,who.name,distract,who);
    }
    if(type==="c2a"){
      const cands=pool.filter(p=>p.concepts&&p.concepts.length);
      if(!cands.length) continue;
      const who=rnd(cands); const c=rnd(who.concepts);
      const distract=sample(ALL.map(p=>p.name),3,[who.name]);
      if(distract.length<3) continue;
      return buildQ("命名观点→提出者",`<span class="hl">${c.n}</span> 是哪位思想家提出的？`,who.name,distract,who);
    }
  }
  return null;
}
function othersWithDistinctName(arr,name){return arr.filter(p=>p.name!==name)}

function buildQ(typeName,text,correct,distract,who){
  const opts=shuffle([correct,...distract]);
  return {typeName,text,correct,opts,who};
}

const SKEY='wpt_wrong';
// localStorage 作持久化（关闭后重开仍在）；window.name 作备份（刷新必定保留，file:// 下也可靠）
function lsGet(){try{return localStorage.getItem(SKEY)}catch(e){return null}}
function lsSet(v){try{localStorage.setItem(SKEY,v)}catch(e){}}
function wnGet(){try{const w=JSON.parse(window.name||'{}');return w.__wpt||null}catch(e){return null}}
function wnSet(v){try{let w={};try{w=JSON.parse(window.name||'{}')}catch(e){}w.__wpt=v;window.name=JSON.stringify(w)}catch(e){}}
function loadWrongBank(){
  let raw=lsGet(); if(!raw) raw=wnGet();
  try{return JSON.parse(raw||'[]')}catch(e){return[]}
}
function saveWrongBank(){
  const v=JSON.stringify(wrongBank.slice(-200));

}

/* ============ 渲染设置区 ============ */
function renderSetup(){
  const ec=$("#eraChips"); ec.innerHTML="";
  // 全选项
  const allChip=mkChip("全部章节",state.eras.size===ERAS.length,()=>{
    if(state.eras.size===ERAS.length){state.eras.clear()} else {ERAS.forEach(e=>state.eras.add(e))}
    renderSetup();
  });
  ec.appendChild(allChip);
  ERAS.forEach(e=>{
    ec.appendChild(mkChip(e,state.eras.has(e),()=>{
      state.eras.has(e)?state.eras.delete(e):state.eras.add(e); renderSetup();
    }));
  });
  const tc=$("#typeChips"); tc.innerHTML="";
  TYPES.forEach(t=>{
    tc.appendChild(mkChip(t.name,state.types.has(t.id),()=>{
      state.types.has(t.id)?state.types.delete(t.id):state.types.add(t.id); renderSetup();
    }));
  });
  const cc=$("#countChips"); cc.innerHTML="";
  [10,20,30,50].forEach(n=>{
    cc.appendChild(mkChip(n+" 题",state.count===n,()=>{state.count=n;renderSetup()}));
  });
  $("#wrongCount").textContent=wrongBank.length;
  $("#wrongBtn").disabled=wrongBank.length===0;
}
function mkChip(label,on,fn){
  const d=document.createElement("div");
  d.className="chip"+(on?" on":""); d.textContent=label; d.onclick=fn; return d;
}

/* ============ 开始一轮 ============ */
function buildQueue(){
  const pool=ALL.filter(p=>state.eras.has(p.era));
  const types=[...state.types];
  const q=[]; const seen=new Set(); let guard=0;
  // 阶段一：尽量凑不重复的题
  while(q.length<state.count && guard<state.count*40){
    guard++;
    const item=makeQuestion(pool,types);
    if(!item){ if(guard>80 && q.length===0) break; continue; }
    const sig=item.typeName+"|"+item.text;
    if(seen.has(sig)) continue;
    seen.add(sig); q.push(item);
  }
  // 阶段二：所选范围内不重复题目不够时，允许重复以补足要求的题量
  if(q.length>0 && q.length<state.count){
    let g2=0;
    while(q.length<state.count && g2<state.count*40){
      g2++; const item=makeQuestion(pool,types); if(item) q.push(item);
    }
  }
  return q;
}
function startRound(queue){
  if(!queue||!queue.length){alert("当前所选范围/题型无法生成题目，请多选一些章节或题型。");return}
  state.queue=queue; state.idx=0; state.score=0; state.wrong=0; state.roundWrong=[]; state.answered=false; state.answers=[];
  $("#setup").classList.add("hidden"); $("#result").classList.add("hidden");
  $("#quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  const q=state.queue[state.idx];
  state.answered=false;
  $("#qcount").textContent=`第 ${state.idx+1} / ${state.queue.length} 题`;
  $("#liveScore").textContent=state.score;
  $("#liveWrong").textContent=state.wrong;
  $("#progBar").style.width=(state.idx/state.queue.length*100)+"%";
  $("#qtype").textContent=q.typeName;
  $("#qtext").innerHTML=q.text;
  const oc=$("#opts"); oc.innerHTML="";
  q.opts.forEach((o,i)=>{
    const d=document.createElement("div");
    d.className="opt"; d.dataset.val=o;
    d.innerHTML=`<span class="k">${"ABCD"[i]}</span><span>${o}</span>`;
    d.onclick=()=>choose(o,d);
    oc.appendChild(d);
  });
  const ex=$("#explain"); ex.className="explain"; ex.innerHTML="";
  $("#nextBtn").disabled=true;
  $("#nextBtn").textContent = state.idx===state.queue.length-1 ? "查看结果" : "下一题";
  $("#prevBtn").disabled = state.idx===0;
  // 重置"加入错题本"按钮
  const ab=$("#addWrongBtn"); ab.classList.add("hidden"); ab.classList.remove("added"); ab.textContent="＋ 加入错题本";
  // 如果这道题已经回答过（从上一题返回时），还原已答状态
  const prev=state.answers[state.idx];
  if(prev){
    state.answered=true;
    document.querySelectorAll(".opt").forEach(o=>{
      o.classList.add("locked");
      const v=o.dataset.val;
      const q=state.queue[state.idx];
      if(v===q.correct) o.classList.add("correct");
      else if(v===prev.chosen&&!prev.wasCorrect) o.classList.add("wrong");
      else o.classList.add("dim");
    });
    renderExplain(state.queue[state.idx], prev.wasCorrect, prev.chosen);
    $("#nextBtn").disabled=false;
    ab.classList.remove("hidden");
    if(!prev.wasCorrect){ab.classList.add("added");ab.textContent="✓ 已加入错题本";}
  }
}

function choose(val,el){
  if(state.answered) return;
  state.answered=true;
  const q=state.queue[state.idx];
  const correct=val===q.correct;
  document.querySelectorAll(".opt").forEach(o=>{
    o.classList.add("locked");
    const v=o.dataset.val;
    if(v===q.correct) o.classList.add("correct");
    else if(o===el) o.classList.add("wrong");
    else o.classList.add("dim");
  });
  if(correct){state.score++;}
  else{
    state.wrong++; state.roundWrong.push(q);
    // 存入错题本（去重）
    const sig=q.typeName+"|"+q.text;
    if(!wrongBank.some(w=>w.typeName+"|"+w.text===sig)){
      wrongBank.push({typeName:q.typeName,text:q.text,correct:q.correct,opts:q.opts,who:q.who});
      saveWrongBank();
    }
  }
  $("#liveScore").textContent=state.score;
  $("#liveWrong").textContent=state.wrong;
  state.answers[state.idx]={chosen:val, wasCorrect:correct};
  renderExplain(q, correct, val);
  $("#nextBtn").disabled=false;
  $("#progBar").style.width=((state.idx+1)/state.queue.length*100)+"%";
  // 答对时显示"加入错题本"；答错时已自动加入，按钮显示为已添加状态
  const ab=$("#addWrongBtn"); ab.classList.remove("hidden");
  if(!correct){ab.classList.add("added");ab.textContent="✓ 已加入错题本";}
}

function renderExplain(q, correct, chosen){
  const who=q.who;
  let tags="";
  if(who.works&&who.works.length) tags+=who.works.map(w=>`<span class="tag">${w}</span>`).join("");
  const pts=(who.points||[]).slice(0,3).map(p=>"· "+p).join("<br>");
  const ex=$("#explain"); ex.className="explain show";
  ex.innerHTML=`<b>${correct?"✓ 正确":"✗ 正确答案："+q.correct}</b>　【${who.era}】${tags?"<br>代表著作："+tags:""}${pts?"<br>"+pts:""}`;
}

function nextQuestion(){
  if(!state.answered) return;
  if(state.idx<state.queue.length-1){state.idx++; renderQuestion();}
  else finish();
}
function prevQuestion(){
  if(state.idx===0) return;
  state.idx--; renderQuestion();
}

function finish(){
  $("#quiz").classList.add("hidden");
  $("#result").classList.remove("hidden");
  $("#finalScore").textContent=state.score;
  $("#finalTotal").textContent=state.queue.length;
  const pct=Math.round(state.score/state.queue.length*100);
  $("#finalPct").textContent=`正确率 ${pct}%　|　答错 ${state.wrong} 题`;
  let tip="";
  if(pct>=90) tip="掌握得很扎实，临场细看易混对（布丹vs霍布斯、卢梭vs洛克）即可。";
  else if(pct>=70) tip="基础不错，重点回看本轮错题和“命名观点→提出者”那几道。";
  else tip="建议先按单个章节分块刷，配合右上角错题本反复巩固。";
  if(wrongBank.length) tip+=` 错题本已累计 ${wrongBank.length} 题。`;
  $("#resultTip").textContent=tip;
  $("#redoWrongBtn").style.display=state.roundWrong.length?"":"none";
}

/* ============ 事件 ============ */
$("#startBtn").onclick=()=>startRound(buildQueue());
$("#wrongBtn").onclick=()=>{
  if(!wrongBank.length) return;
  const q=shuffle(wrongBank.map(w=>({...w,opts:shuffle(w.opts)})));
  startRound(q);
};
$("#nextBtn").onclick=nextQuestion;
$("#prevBtn").onclick=prevQuestion;
$("#quitBtn").onclick=()=>{state.queue=state.queue.slice(0,state.idx+1);finish();};
$("#againBtn").onclick=()=>startRound(buildQueue());
$("#redoWrongBtn").onclick=()=>{
  const q=shuffle(state.roundWrong.map(w=>({...w,opts:shuffle(w.opts)})));
  startRound(q);
};
$("#backBtn").onclick=()=>{
  $("#result").classList.add("hidden"); $("#setup").classList.remove("hidden"); renderSetup();
};
document.addEventListener("keydown",e=>{
  if($("#quiz").classList.contains("hidden")) return;
  if(["1","2","3","4"].includes(e.key)){
    const els=document.querySelectorAll(".opt");
    const i=+e.key-1; if(els[i]&&!state.answered) els[i].click();
  } else if(e.key==="Enter"||e.key==="ArrowRight"){
    if(state.answered) nextQuestion();
  } else if(e.key==="ArrowLeft"){
    prevQuestion();
  }
});

// ===== 手动加入错题本 =====
$("#addWrongBtn").onclick=function(){
  if(this.classList.contains("added")) return;
  const q=state.queue[state.idx];
  const sig=q.typeName+"|"+q.text;
  if(!wrongBank.some(w=>w.typeName+"|"+w.text===sig)){
    wrongBank.push({typeName:q.typeName,text:q.text,correct:q.correct,opts:q.opts,who:q.who});
    saveWrongBank();
  }
  this.classList.add("added"); this.textContent="✓ 已加入错题本";
  toast("已加入错题本");
  renderSetup(); // 刷新首页错题数
};

// ===== 导出 / 导入 / 清空 =====
function addWrongToBank(list){
  let added=0;
  list.forEach(w=>{
    const sig=w.typeName+"|"+w.text;
    if(!wrongBank.some(x=>x.typeName+"|"+x.text===sig)){wrongBank.push(w);added++;}
  });
  saveWrongBank(); renderSetup(); return added;
}

$("#exportBtn").onclick=function(){
  if(!wrongBank.length){toast("错题本是空的");return;}
  const box=$("#ioBox"),ci=$("#confirmImportBtn");
  box.value=JSON.stringify(wrongBank);
  box.classList.remove("hidden"); ci.classList.add("hidden");
  box.select(); try{document.execCommand("copy");toast("已复制到剪贴板，也可以手动从下方文本框复制");}catch(e){toast("请手动复制下方文本框内容");}
};

$("#importBtn").onclick=function(){
  const box=$("#ioBox"),ci=$("#confirmImportBtn");
  box.value=""; box.classList.remove("hidden"); ci.classList.remove("hidden");
  box.placeholder="把导出的文字粘贴到这里，然后点「确认导入」";
  box.focus();
};

$("#confirmImportBtn").onclick=function(){
  try{
    const list=JSON.parse($("#ioBox").value.trim());
    if(!Array.isArray(list)) throw new Error();
    const n=addWrongToBank(list);
    toast(`导入成功，新增 ${n} 题（重复已跳过）`);
    $("#ioBox").classList.add("hidden"); this.classList.add("hidden");
  }catch(e){toast("格式不对，请粘贴完整的导出内容");}
};

$("#clearWrongBtn").onclick=function(){
  if(!wrongBank.length){toast("错题本已经是空的");return;}
  if(!confirm(`确定清空全部 ${wrongBank.length} 道错题吗？`)) return;
  wrongBank=[]; saveWrongBank(); renderSetup(); toast("错题本已清空");
  $("#ioBox").classList.add("hidden"); $("#confirmImportBtn").classList.add("hidden");
};

// ===== 验证弹窗：答对(11)进入，答错则封锁页面 =====
(function(){
  const gate=$("#gateModal"), input=$("#gateInput");
  function pass(){
    gate.classList.add("hidden");
    $("#introModal").classList.remove("hidden");
  }
  function block(){
    // 浏览器不允许脚本关闭用户打开的标签页，这里用清空+遮罩等效“无法使用”
    try{window.close();}catch(e){}
    document.body.innerHTML='<div class="blocked"><div class="big">🔒</div>'
      +'<div class="t">你竟然不知道梁鹤鸣是国政最强十一号？</div></div>';
  }
  function submit(){
    const ans=(input.value||"").replace(/[^0-9]/g,""); // 取数字，"11""11号"均可
    if(ans==="11") pass(); else block();
  }
  $("#gateSubmit").onclick=submit;
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
  input.focus();
})();

// ===== 开场弹窗（两个选项都可关闭，无关闭叉）=====
(function(){
  const m=$("#introModal");
  const close=()=>m.classList.add("hidden");
  $("#modalNo").onclick=close;
  $("#modalYes").onclick=close;
})();

renderSetup();
</script>
</body>
</html>
